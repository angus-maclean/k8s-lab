apiVersion: v1
kind: ReplicationController
metadata:
  labels:
    app: my-app
  name: my-app
spec:
  replicas: 3
  selector:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}
